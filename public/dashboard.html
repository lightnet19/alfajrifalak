<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alfajri Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/jspdf@3.0.1/dist/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f5f5f5;
}

h2 {
  margin-bottom: 10px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 8px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
  max-width: 760px;
}

label {
  display: block;
  margin-top: 8px;
  margin-bottom: 4px;
  font-weight: 600;
}

input, select {
  width: 100%;
  padding: 8px 10px;
  box-sizing: border-box;
  margin-bottom: 8px;
}

button {
  padding: 8px 12px;
  margin: 3px 4px 3px 0;
  cursor: pointer;
}

pre {
  background: #111;
  color: #0f0;
  padding: 15px;
  overflow-x: auto;
  white-space: pre-wrap;
  border-radius: 6px;
}
</style>
</head>

<body>

<h2>🌙 Alfajri Observatorium</h2>

<div style="display:flex; gap:20px;">

  <!-- LEFT PANEL -->
  <div style="width:300px; background:#fff; padding:15px; border-radius:10px;">
    <h3>📍 Markaz</h3>

    <input id="markaz" placeholder="Nama Markaz"><br>
    <input id="lat" placeholder="Latitude"><br>
    <input id="lon" placeholder="Longitude"><br>
    <input id="elevation" placeholder="Elevasi"><br>
    <input id="tz" placeholder="Timezone" value="7"><br>

    <button onclick="getGPS()">GPS</button>
    <button onclick="saveMarkaz()">Simpan</button>
    <button onclick="deleteMarkaz()">Hapus</button>

    <select id="markazList"></select>
  </div>

  <!-- RIGHT PANEL -->
  <div style="flex:1; background:#111; padding:15px; border-radius:10px; color:#0f0;">
    <h3>🔭 Output</h3>

    <button onclick="run()">Hitung</button>
    <button onclick="exportPDF()">Export PDF</button>

    <pre id="out"></pre>
  </div>

</div>

<script type="module" src="/js/app.js"></script>

</body>
</html>
