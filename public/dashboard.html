<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alfajri Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/jspdf@3.0.1/dist/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

h2 {
  margin-bottom: 10px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 8px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0 10px;
}

button {
  padding: 8px 12px;
  margin: 3px;
  cursor: pointer;
}

pre {
  background: #111;
  color: #0f0;
  padding: 15px;
  overflow-x: auto;
}
</style>
</head>

<body>

<h2>🌙 Alfajri - Dashboard Rukyat</h2>

<div class="card">
  <h3>📍 Lokasi / Markaz</h3>

  <label>Nama Markaz</label>
  <input id="markaz" placeholder="PCNU Kencong">

  <label>Latitude</label>
  <input id="lat" type="number" step="0.000001">

  <label>Longitude</label>
  <input id="lon" type="number" step="0.000001">

  <label>Elevasi (mdpl)</label>
  <input id="elevation" type="number" value="0">

  <label>Zona Waktu</label>
  <input id="tz" type="number" value="7">

  <button onclick="getGPS()">📡 Ambil GPS</button>
  <button onclick="saveMarkaz()">💾 Simpan</button>
  <button onclick="deleteMarkaz()">🗑 Hapus</button>

  <label>Daftar Markaz</label>
  <select id="markazList"></select>
</div>

<div class="card">
  <h3>⚙️ Aksi</h3>
  <button onclick="run()">🔭 Hitung Hilal</button>
  <button onclick="exportPDF()">📄 Export PDF</button>
</div>

<div class="card">
  <h3>📊 Hasil</h3>
  <pre id="out">Klik "Hitung" untuk melihat hasil...</pre>
</div>

<script type="module" src="/js/app.js"></script>

</body>
</html>
