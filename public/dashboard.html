<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alfajri Observatorium</title>

<script src="https://cdn.jsdelivr.net/npm/jspdf@3.0.1/dist/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: #e6edf3;
}

/* LAYOUT */
.container {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 300px;
  background: #111827;
  padding: 20px;
  overflow-y: auto;
  border-right: 1px solid #1f2937;
}

.sidebar h3 {
  margin-top: 20px;
  color: #60a5fa;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 8px;
  margin: 6px 0 10px;
  background: #0b1220;
  border: 1px solid #1f2937;
  color: #fff;
}

/* BUTTON */
button {
  padding: 8px 10px;
  margin: 4px 3px 4px 0;
  background: #2563eb;
  border: none;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

/* OUTPUT */
pre {
  background: #020617;
  padding: 15px;
  border-radius: 8px;
  color: #22c55e;
  height: 250px;
  overflow: auto;
}

/* CANVAS */
canvas {
  background: #000;
  border-radius: 8px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>🌙 Alfajri</h2>

    <h3>📍 Markaz</h3>

    <input id="markaz" placeholder="Nama Markaz">

    <input id="lat" placeholder="Latitude">
    <input id="lon" placeholder="Longitude">
    <input id="elevation" placeholder="Elevasi (mdpl)" value="0">
    <input id="tz" placeholder="Zona Waktu" value="7">

    <button onclick="getGPS()">📡 GPS</button>
    <button onclick="saveMarkaz()">💾 Simpan</button>
    <button onclick="deleteMarkaz()">🗑 Hapus</button>

    <select id="markazList"></select>

  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>Observatorium Dashboard</h2>

    <button onclick="run()">🔭 Hitung</button>
    <button onclick="exportPDF()">📄 Export PDF</button>

    <pre id="out">Klik "Hitung" untuk melihat hasil...</pre>

    <!-- GRAFIK -->
    <canvas id="chart" width="600" height="300"></canvas>

  </div>

</div>

<script type="module" src="/js/app.js"></script>

<script>
// ========================
// SIMPLE GRAPH (SUN vs MOON)
// ========================
function drawChart(data) {
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const centerY = canvas.height / 2;

  // garis horizon
  ctx.strokeStyle = "#444";
  ctx.beginPath();
  ctx.moveTo(0, centerY);
  ctx.lineTo(canvas.width, centerY);
  ctx.stroke();

  // matahari
  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(200, centerY - data.sunAltitude * 3, 6, 0, Math.PI*2);
  ctx.fill();

  // bulan
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(400, centerY - data.moonAltitude * 3, 6, 0, Math.PI*2);
  ctx.fill();
}

// override run biar update grafik
const oldRun = window.run;
window.run = () => {
  oldRun();

  if (window.last) {
    drawChart(window.last);
  }
};
</script>

</body>
</html>
